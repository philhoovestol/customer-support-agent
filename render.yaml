services:
  - type: web
    name: philh-loopp-customer-support-agent
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/support_agent.db
      - key: LLM_PROVIDER
        value: mock
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
